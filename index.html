<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>NFT preview card component</title>

    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body>
    <article class="card">
      <section class="card-head">
        <a href="#!">
          <img
            src="./images/image-equilibrium.jpg"
            alt="An illustration of an equilibrim "
          />
        </a>
      </section>
      <section class="card-body">
        <div class="card-body-content">
          <div class="card-body-content-info">
            <a href="#!">
              <h1 class="title">Equilibrium #3429</h1>
            </a>
            <p>Our Equilibrium collection promotes balance and calm.</p>
          </div>
          <div class="card-body-content-value">
            <a class="price" href="#!">
              <img src="./images/icon-ethereum.svg" alt="Ethereum Icon " />
              0.041 ETH
            </a>
            <a class="days">
              <img src="./images/icon-clock.svg" alt="Clock Icon " />
              3 days left
            </a>
          </div>
        </div>
        <div class="card-body-line"></div>
        <div class="card-body-footer">
          <img
            src="./images/image-avatar.png"
            alt="An avatar of the creator"
            class="avatar"
          />
          <a class="creator" href="#!">
            <span class="light">Creation of</span> Jules Wyvern
          </a>
        </div>
      </section>
    </article>
  </body>
</html>
